# PRE-REQUISITE (manual, npm web UI — must be done before the first tag):
# Configure npm Trusted Publisher (OIDC) for BOTH @gotsaeng/core AND @gotsaeng/cli,
# bound to this repository's release.yml workflow.
# Without it the first OIDC publish will silently fail.
# See: https://docs.npmjs.com/generating-provenance-statements#publishing-packages-with-provenance-via-github-actions

name: Release

on:
  push:
    tags:
      # Bare version tags only — NO "v" prefix (e.g. "0.10.1", not "v0.10.1").
      # This matches Obsidian's tag-equals-manifest-version rule.
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: read

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 8.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: pnpm lint

  publish:
    name: Publish to npm (OIDC)
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm OIDC trusted publishing + provenance

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 8.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      # Upgrade npm before publishing. Node 20's bundled npm is 10.x; OIDC trusted
      # publishing (granular access tokens via GitHub Actions OIDC) requires npm >=9.5.
      # While 10.x satisfies that floor, `npm@latest` ensures we get the most recent
      # OIDC + provenance fixes without waiting for a Node LTS update.
      - name: Upgrade npm
        run: npm install -g npm@latest

      # Publish @gotsaeng/core FIRST — @gotsaeng/cli depends on it.
      # Publishing cli before core would leave a window where cli resolves a stale core.
      # No NODE_AUTH_TOKEN: npm obtains a short-lived token from the GitHub OIDC provider
      # automatically when id-token: write is set and a Trusted Publisher is configured.
      - name: Publish @gotsaeng/core
        run: pnpm --filter @gotsaeng/core publish --access public --provenance --no-git-checks

      # Publish @gotsaeng/cli SECOND — after core is live on the registry.
      - name: Publish @gotsaeng/cli
        run: pnpm --filter @gotsaeng/cli publish --access public --provenance --no-git-checks

  github-release:
    name: GitHub Release
    needs: publish  # only cut a GitHub release once npm publish succeeded
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release and upload the Obsidian plugin assets

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 8.12.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build the Obsidian plugin so dist/{main.js,manifest.json,styles.css} exist.
      # Obsidian clients download these three files for community-plugin installs.
      - name: Build plugin assets
        run: pnpm build

      # Use this version's CHANGELOG.md section as the release body.
      - name: Extract release notes
        run: |
          version="${GITHUB_REF_NAME}"
          awk -v header="## ${version}" '
            $0 == header { capture = 1; next }
            /^## / { if (capture) exit }
            capture { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            printf 'Release %s\n' "${version}" > release-notes.md
          fi

      # Create-or-update so a re-run after a flake is safe (npm has already
      # published by this point and cannot be re-published).
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=()
          case "${GITHUB_REF_NAME}" in
            *-*) flags+=(--prerelease) ;;  # tags like 0.10.6-beta.1 are pre-releases
          esac
          assets=(
            apps/obsidian-plugin/dist/main.js
            apps/obsidian-plugin/dist/manifest.json
            apps/obsidian-plugin/dist/styles.css
          )
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists; updating notes and assets."
            gh release edit "${GITHUB_REF_NAME}" "${flags[@]}" --notes-file release-notes.md
            gh release upload "${GITHUB_REF_NAME}" "${assets[@]}" --clobber
          else
            gh release create "${GITHUB_REF_NAME}" "${flags[@]}" \
              --title "${GITHUB_REF_NAME}" \
              --notes-file release-notes.md \
              "${assets[@]}"
          fi
